<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemotvis</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/themes.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
    <!-- Boot sequence overlay — content set per theme by JS -->
    <div class="boot-overlay" id="boot" aria-hidden="true"></div>

    <div id="screen" class="crt">
        <!-- Top bar -->
        <header id="header">
            <div class="header-left">
                <span class="system-label">GEMOT</span>
                <span class="status-indicator" id="connection-status">OFFLINE</span>
            </div>
            <div class="header-center" id="topic-display">
                <span class="topic-label">NO ACTIVE DELIBERATION</span>
            </div>
            <div class="header-right">
                <span class="system-label" id="round-display">ROUND --</span>
                <span class="system-label" id="template-display">--</span>
            </div>
        </header>

        <!-- Deliberation selector -->
        <nav id="delib-nav" class="hidden">
            <div class="nav-label">DELIBERATIONS</div>
            <div id="delib-list"></div>
        </nav>

        <!-- Auto-cycle progress bar -->
        <div id="cycle-bar" class="cycle-bar hidden">
            <div id="cycle-progress" class="cycle-progress"></div>
        </div>

        <!-- Main visualization area -->
        <main id="main">
            <!-- HUD corner brackets -->
            <div class="hud-corners">
                <div class="hud-corner tl"></div>
                <div class="hud-corner tr"></div>
                <div class="hud-corner bl"></div>
                <div class="hud-corner br"></div>
            </div>

            <!-- Edge data readouts -->
            <div class="edge-readout left" id="edge-left">MAGI // DELIBERATION MONITOR // GEMOT</div>
            <div class="edge-readout right" id="edge-right">STRUCTURED CONSENSUS PROTOCOL // A2A LINK</div>

            <!-- SVG layer for connection lines -->
            <svg id="connections" class="connection-layer" aria-hidden="true"></svg>

            <!-- Agent nodes container -->
            <div id="agents" class="agents-container"></div>

            <!-- Center panel (consensus/bridging) -->
            <div id="center-panel" class="center-panel hidden">
                <div class="panel-header">MAGI</div>
                <div id="center-content" class="panel-content"></div>
            </div>
        </main>

        <!-- Analysis pipeline progress -->
        <div id="analysis-bar" class="analysis-bar hidden">
            <div class="analysis-label">ANALYZING</div>
            <div class="pipeline">
                <div class="pipeline-stage" data-stage="taxonomy">TAXONOMY</div>
                <div class="pipeline-stage" data-stage="extracting">EXTRACTING</div>
                <div class="pipeline-stage" data-stage="deduplicating">DEDUP</div>
                <div class="pipeline-stage" data-stage="crux_detection">CRUX DETECT</div>
                <div class="pipeline-stage" data-stage="summarizing">SUMMARIZE</div>
                <div class="pipeline-stage" data-stage="complete">COMPLETE</div>
            </div>
        </div>

        <!-- Timeline scrubber -->
        <div id="scrubber-bar" class="scrubber-bar hidden">
            <button id="scrubber-play" class="scrubber-btn" title="Play/Pause">&#x25B6;</button>
            <div id="scrubber-track" class="scrubber-track">
                <div id="scrubber-dots" class="scrubber-dots"></div>
            </div>
            <button id="scrubber-live" class="scrubber-btn scrubber-live" title="Jump to live">LIVE</button>
            <span id="scrubber-label" class="scrubber-label"></span>
        </div>

        <!-- Bottom panels -->
        <footer id="footer">
            <div id="crux-panel" class="footer-panel">
                <div class="panel-header">CRUXES</div>
                <div id="crux-list" class="panel-scroll"></div>
            </div>
            <div id="metrics-panel" class="footer-panel">
                <div class="panel-header">METRICS</div>
                <div id="metrics-content" class="metrics-grid"></div>
            </div>
            <div id="audit-panel" class="footer-panel audit-ticker">
                <div class="panel-header">AUDIT LOG</div>
                <div id="audit-log" class="panel-scroll"></div>
            </div>
        </footer>

        <!-- CRT overlay -->
        <div class="scanlines"></div>
    </div>

    <!-- SVG defs for theme effects (zero visual impact until referenced) -->
    <svg class="svg-defs" width="0" height="0" aria-hidden="true">
        <defs>
            <!-- Parchment grain texture (classic theme) -->
            <filter id="parchment-grain">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
                <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
                <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
                <feComponentTransfer in="blend">
                    <feFuncA type="linear" slope="0.3"/>
                </feComponentTransfer>
            </filter>
            <!-- Heraldic shield clip-path (classic theme agent nodes)
                 Source: Wikimedia Commons, public domain -->
            <clipPath id="shield" clipPathUnits="objectBoundingBox">
                <path d="M0.006,0.005 V0.292
                         C0.006,0.445 0.057,0.588 0.145,0.706
                         C0.266,0.856 0.436,0.967 0.5,0.995
                         C0.564,0.967 0.734,0.856 0.855,0.706
                         C0.943,0.588 0.994,0.445 0.994,0.292
                         V0.005 Z"/>
            </clipPath>
            <!-- Hand-drawn line effect (classic theme road connections) -->
            <filter id="hand-drawn">
                <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <script src="/js/app.js" type="module"></script>
</body>
</html>
