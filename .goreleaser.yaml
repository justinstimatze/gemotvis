version: 2

builds:
  - main: .
    binary: gemotvis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "gemotvis_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/justinstimatze/gemotvis:{{ .Tag }}"
      - "ghcr.io/justinstimatze/gemotvis:latest"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
